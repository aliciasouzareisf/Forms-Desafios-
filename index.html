<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../estilo/style.css">
    <title>Desafios de Validação</title>
</head>

<body>
    <div>
        <form>
            <h2>Confirmação de Senha</h2>
            <label>Senha:</label>
            <input type="password" id="senha1">

            <label>Confirmar Senha:</label>
            <input type="password" id="senha2">

            <button type="button" onclick="validarSenha()">Validar</button>
        </form>
        <p id="mensagem"></p>
    </div>
    <hr>

    <div>
        <form>
            <h2> Desafio 2</h2>
            <label>Idade:</label>
            <input type="number" id="idade">

            <select name="estudante" id="estudante">
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <button type="button" onclick="verificarDesconto()">Verificar Desconto</button>
        </form>
        <p id="msg"></p>
    </div>
    <hr>

    <div>
        <form>
            <h2>Desafio 3 — Bouncer do sistema</h2>
            <label>Nome:</label>
            <input type="text" id="nome">

            <label>Idade:</label>
            <input type="number" id="age">

            <button type="button" onclick="verificarBouncer()">Entrar</button>
            
        </form>
        <p id="msgBouncer"></p>
    </div>
    <script src="../scripts/scripts.js"></script>
</body>
</html>
