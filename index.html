<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios Inteligentes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Atividade 2 </h1>
    <h2> Formulários inteligentes e tomadas de decisão</h2>

    
    <form id="form">
        <label> Nome:</label>
        <input type="text" id="nome">
        <br>
        <label> idade:</label>
        <input type="number" id="idade">
        <br>
        <label> Nivel de experiencia (1 a 10):</label>
        <input type="number" id="nivel">
        <br>
        <button type="button" onclick="validar()">Enviar</button>
    </form>
    <p id="mensagem"></p>
    
   <h2> Crie uma senha.</h2>
    <form id="Form1">
        <label> Senha:</label>
        <input type="password" id="senha1">
        <br>
        <label> Digite sua senha novamente:</label>
        <input type="password" id="senha2">
        <br>
        <button type="button" onclick="validarSenha()">Validar</button>
    </form>
    <p id="mensagemDesafio1"></p>

    <h2>Veja se você tem direito a desconto.</h2>
    <form id="Form2">
        <label>Qual sua idade?</label>
        <input type="number" id="idade">
        <br>
        <label>Você é estudante?</label>
        <select id="estudante">
            <option value="nao">Não</option>
            <option value="sim">Sim</option>
        </select>
        <br>
        <button type="button" onclick="validarDesconto()">Validar</button>
    </form>
    <p id="mensagemDesafio2"></p>

    <h2>Preencha.</h2>
    <form id="Form3">
        <label> Nome:</label>
        <input type="text" id="nome3">
        <br>
        <label> idade:</label>
        <input type="number" id="idade3">
        <br>
        <button type="button" onclick="validarNomeIdade()">Validar</button>
    </form>
    <p id="mensagemDesafio3"></p>
    <script src="scripts.js"></script>
</body>
</html>
